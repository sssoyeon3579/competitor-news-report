function copyLink(url,e){
  e.preventDefault();e.stopPropagation();
  navigator.clipboard.writeText(url);
  const toast=document.getElementById('toast');
  toast.textContent='링크가 복사되었습니다';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

function buildSummary(){
  const counts=COMPANIES.map(c=>DATA[c].length);
  const total=counts.reduce((a,b)=>a+b,0);
  const max=Math.max(...counts);
  const cats=['신제품·서비스 출시','수상·인증·기타 홍보','사업 제휴·투자','실적·경영 동향'];
  const pressVsArticle=COMPANIES.map(c=>{
    const press=DATA[c].filter(a=>a.s==='보도자료').length;
    const article=DATA[c].filter(a=>a.s==='기사').length;
    return {press,article,pct:DATA[c].length?Math.round(article/DATA[c].length*100):0};
  });
  return `<div class="slide-inner">
    <div class="summary-title">전체 요약</div>
    <p class="summary-sub">2026년 4~6월 경쟁사 보도 현황 비교 (총 ${total}건)</p>
    <div style="margin-bottom:32px">
      ${COMPANIES.map((c,i)=>`<div class="bar-row">
        <span class="bar-label" style="color:${COMPANY_HEX[c]}">${c}</span>
        <div class="bar-track"><div class="bar-fill" style="background:${COMPANY_HEX[c]};--w:${Math.round(counts[i]/max*100)}%">${counts[i]}건</div></div>
      </div>`).join('')}
    </div>
    <h3 style="font-size:1.05rem;margin-bottom:14px;font-weight:700">분류별 · 출처별 비교</h3>
    <table class="summary-table">
      <thead><tr>
        <th style="text-align:left">분류</th>
        ${COMPANIES.map((c,i)=>`<th style="color:${COMPANY_HEX[c]}">${c}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${cats.map(cat=>`<tr><td>${cat}</td>${COMPANIES.map(c=>{const v=DATA[c].filter(a=>a.c===cat).length;return `<td style="color:${v?COMPANY_HEX[c]:'#ddd'}">${v}</td>`}).join('')}</tr>`).join('')}
      </tbody>
      <tfoot><tr>
        <td>합계</td>${counts.map((v,i)=>`<td style="color:${COMPANY_HEX[COMPANIES[i]]}">${v}</td>`).join('')}
      </tr></tfoot>
    </table>
    <div class="insight-cards">
      <div class="insight-card" style="border-color:${COMPANY_HEX['천재교육']}">
        <h4>천재교육 — PR 건수 1위</h4>
        <p>40건으로 전체의 49%. 이벤트 중심 공격적 미디어 전략으로 밀크T·T셀파 브랜드 노출 극대화</p>
      </div>
      <div class="insight-card" style="border-color:${COMPANY_HEX['비상교육']}">
        <h4>비상교육 — 기자 취재 최다</h4>
        <p>14건 중 기사 ${pressVsArticle[1].article}건(${pressVsArticle[1].pct}%). 실적 호조로 자연스러운 미디어 주목 달성</p>
      </div>
      <div class="insight-card" style="border-color:${COMPANY_HEX['미래엔']}">
        <h4>미래엔 — 다각화 전략</h4>
        <p>21건. 초코클래스·초코키즈 등 디지털 플랫폼 확장과 교총 협약으로 현장 네트워크 강화</p>
      </div>
      <div class="insight-card" style="border-color:${COMPANY_HEX['동아출판']}">
        <h4>동아출판 — AI 디지털 특화</h4>
        <p>6건으로 최소이나, AI 디지털 교육자료에 선택과 집중하는 명확한 포지셔닝</p>
      </div>
    </div>

  </div>`;
}

function buildCard(a, company){
  const safeUrl=a.u.replace(/'/g,"\\'");
  const catColor=CAT_COLORS[a.c]||'#888';
  return `<a class="news-card-link" href="${a.u}" target="_blank" rel="noopener" data-cat="${a.c}">
    <article class="news-card">
      <div class="news-image" style="position:relative">
        ${a.i ? `<img src="${a.i}" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1" onerror="this.remove();this.parentElement.querySelector('.news-image-fallback').style.display='flex'">` : ''}
        <span class="card-cat-badge" style="background:${catColor};z-index:3">${a.c}</span>
        ${a.s==='기사'?'<span class="card-type-badge article" style="z-index:3">기자 취재</span>':''}
        <button class="share-btn" onclick="copyLink('${safeUrl}',event)" title="링크 복사" style="z-index:3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <div class="news-image-fallback" style="background:${COMPANY_GRADIENT[company]};${a.i?'display:none':''}">
          <div class="fallback-bar" style="background:${COMPANY_HEX[company]}"></div>
          <div class="fallback-text">NEWS</div>
          <div class="fallback-sub">${company}</div>
        </div>
      </div>
      <div class="news-content">
        <div class="news-meta"><span class="news-date">${fmtDate(a.d)}</span></div>
        <h3 class="news-title">${a.t}</h3>
        <div class="news-footer">
          <span class="news-source">${getSource(a.u)}</span>
          <span class="news-link-icon">원문 &#8599;</span>
        </div>
      </div>
    </article>
  </a>`;
}

// ─── 슬라이드 렌더링 ───
const container=document.getElementById('slidesContainer');
const slideContents=[buildCover(),buildSummary(),...COMPANIES.map(c=>buildCompanySlide(c)),buildImplications()];
slideContents.forEach((html,i)=>{
  const div=document.createElement('div');
  div.className='slide'+(i===0?' active':'');
  div.innerHTML=html;
  container.appendChild(div);
});

// 썸네일 옵저버 시작

// ─── 네비게이션 ───
let current=0;
const slides=document.querySelectorAll('.slide');
const total=slides.length;

function updateNav(){
  document.getElementById('progress').style.width=`${((current+1)/total)*100}%`;
  document.querySelectorAll('.nav-item').forEach((btn,i)=>{
    const isActive=i===current;
    btn.classList.toggle('active',isActive);
    btn.style.background=isActive?btn.dataset.color:'';
  });
}

function goTo(idx){
  if(idx<0||idx>=total||idx===current)return;
  current=idx;
  slides.forEach((s,i)=>{s.className='slide'+(i===current?' active':'')});
  slides[current].scrollTop=0;
  updateNav();
  if(current===1)setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.classList.add('animate')),100);
}

function navigate(dir){
  if(current+dir<0||current+dir>=total)return;
  current+=dir;
  slides.forEach((s,i)=>{s.className='slide'+(i===current?' active':'')});
  slides[current].scrollTop=0;
  updateNav();
  if(current===1)setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.classList.add('animate')),100);
}
updateNav();

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX});
document.addEventListener('touchend',e=>{const diff=e.changedTouches[0].clientX-touchStartX;if(Math.abs(diff)>50)navigate(diff<0?1:-1)});

// ─── 카테고리 필터 ───
document.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  const bar=btn.closest('.filter-bar');
  const company=bar.dataset.company;
  bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cat=btn.dataset.cat;
  const grid=document.querySelector(`.cards-grid[data-company="${company}"]`);
  grid.querySelectorAll('.news-card-link').forEach(card=>{
    card.style.display=(cat==='전체'||card.dataset.cat===cat)?'block':'none';
  });
});
</script>
