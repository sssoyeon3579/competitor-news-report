*{margin:0;padding:0;box-sizing:border-box}
:root{

html,body{height:100%;font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ─── 슬라이드 ─── */
.slides-container{position:relative;width:100%;height:100%}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;transform:translateX(60px);overflow-y:auto;

.slide.active{opacity:1;pointer-events:auto;transform:translateX(0);z-index:2}
.slide.prev{transform:translateX(-60px)}
.slide-inner{width:100%;max-width:1200px;padding:30px 40px 100px;flex:1}

/* ─── 네비게이션 (목차형) ─── */
.nav-bar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:stretch;padding:0;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid #ebebeb;z-index:100}
.nav-item{flex:1;padding:16px 0;border:none;font-size:1.05rem;cursor:pointer;transition:all .2s;font-weight:600;font-family:'Pretendard',sans-serif;background:transparent;color:#555;white-space:nowrap;text-align:center;border-right:1px solid #f0f0f0}
.nav-item:last-child{border-right:none}
.nav-item:hover{background:#f3f4f6;color:var(--text)}
.nav-item.active{color:var(--white);font-weight:800}
.nav-item .nav-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),#f97316);z-index:101;transition:width .4s}

.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:100vh;padding:40px}
.cover-badge{display:inline-block;padding:8px 24px;background:rgba(233,70,10,.08);border-radius:20px;font-size:1rem;color:var(--accent);margin-bottom:30px;letter-spacing:1px;font-weight:600}
.cover h1{font-size:3.2rem;font-weight:800;line-height:1.35;margin-bottom:20px;letter-spacing:-1px}

.company-pills{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:44px}
.company-pill{padding:10px 24px;border-radius:20px;font-size:1.05rem;font-weight:600;color:var(--white)}
.cover-meta{font-size:1.05rem;color:#444;line-height:2}
.page-logo{position:fixed;bottom:40px;right:-20px;height:380px;opacity:.08;z-index:50;pointer-events:none}

/* ─── 요약 ─── */
.summary-title{font-size:2.2rem;font-weight:800;margin-bottom:10px;letter-spacing:-0.5px}
.summary-sub{color:var(--muted);margin-bottom:32px;font-size:1.15rem}
.bar-row{display:flex;align-items:center;margin-bottom:14px;gap:14px}
.bar-label{width:100px;text-align:right;font-weight:700;font-size:1.05rem;flex-shrink:0}
.bar-track{flex:1;height:44px;background:#f3f4f6;border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:14px;color:var(--white);font-weight:700;font-size:1.05rem;transition:width 1s ease .3s;width:0}
.bar-fill.animate{width:var(--w)}
.insight-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:24px}
.insight-card{padding:20px;border-radius:14px;background:var(--white);border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.insight-card h4{font-size:1.1rem;margin-bottom:8px;font-weight:700}
.insight-card p{font-size:1rem;color:#555;line-height:1.6}

/* ─── 회사 슬라이드 ─── */
.company-header{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.company-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.company-name{font-size:2.2rem;font-weight:800;letter-spacing:-0.5px}
.company-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}

.filter-btn.active,.filter-btn:hover{background:var(--text);color:var(--white);border-color:var(--text)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.news-card-link{text-decoration:none;color:inherit;display:block;height:100%}
.news-card{

.share-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;z-index:2;backdrop-filter:blur(4px)}

.card-cat-badge{position:absolute;top:8px;left:8px;padding:5px 14px;border-radius:12px;font-size:.92rem;font-weight:700;color:var(--white);z-index:2;backdrop-filter:blur(4px)}
.card-type-badge{position:absolute;bottom:8px;left:8px;padding:4px 12px;border-radius:8px;font-size:.85rem;font-weight:700;z-index:2}
.card-type-badge.press{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

.news-content{padding:16px 18px 14px;flex:1;display:flex;flex-direction:column}

.news-source{font-size:15px;color:#555;font-weight:600}

.impl-section{margin-bottom:28px}

.impl-body{padding-left:20px;font-size:1.05rem;line-height:1.75;color:#374151}
.impl-body li{margin-bottom:4px}
.impl-warn{color:#dc2626;font-weight:600}
.impl-highlight{background:#fef9c3;padding:1px 4px;border-radius:3px}
.impl-takeaway{background:var(--white);border-radius:14px;padding:24px;margin-top:24px;box-shadow:0 1px 3px rgba(0,0,0,.04);border-left:4px solid var(--accent)}

/* ─── 토스트 ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:#111;color:#fff;font-size:14px;font-weight:600;padding:10px 22px;border-radius:10px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── 테이블 ─── */
.summary-table{width:100%;border-collapse:collapse;font-size:.9rem;margin-bottom:28px}
.summary-table thead tr{border-bottom:2px solid #e5e7eb}
.summary-table th{text-align:center;padding:12px 10px;font-weight:700;font-size:1rem}
.summary-table th:first-child{text-align:left}
.summary-table td{text-align:center;padding:10px;font-weight:600;font-size:1rem}
.summary-table td:first-child{text-align:left;font-weight:500;font-size:.95rem}
.summary-table tbody tr{border-bottom:1px solid #f3f4f6}
.summary-table tbody tr:last-child{border-bottom:2px solid #e5e7eb}
.summary-table tfoot td{padding-top:10px;font-weight:800}

@media(max-width:768px){
  .slide-inner{padding:20px 16px 90px}

  .nav-btn{padding:8px 18px;font-size:.85rem}

@media(max-width:480px){

}

/* ─── 인쇄용 표 (화면에서는 숨김) ─── */
.print-table{display:none}

/* ─── 인쇄 버튼 ─── */
.print-btn{position:fixed;top:16px;right:20px;z-index:200;padding:10px 22px;background:var(--white);border:1px solid #ddd;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{height:auto;overflow:visible}
  .progress-bar,.nav-bar,.page-logo,.print-btn,.filter-bar,.share-btn{display:none!important}

  .slide-inner{padding:20px 30px 30px;max-width:100%}

  .summary-title{font-size:1.6rem}
  .company-name{font-size:1.6rem}
  .bar-track{height:30px}
  .insight-card{break-inside:avoid}
  .impl-section{break-inside:avoid}
}

function copyLink(url,e){
  e.preventDefault();e.stopPropagation();
  navigator.clipboard.writeText(url);
  const toast=document.getElementById('toast');
  toast.textContent='링크가 복사되었습니다';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2000);
}

function buildCard(a, company){

  return `<a class="news-card-link" href="${a.u}" target="_blank" rel="noopener" data-cat="${a.c}">

  if(!area)return;

  var short_={'AI 디지털 교육자료(AIDT)':'AIDT','교사 지원·네트워크':'교사 네트워크','마케팅·이벤트':'마케팅','교과서·학습서':'교과서·학습서','업무협약·MOU':'MOU','AI 에듀테크':'AI 에듀테크','실적·경영':'실적'};
  var html='';
  COMPANIES.forEach(function(company){
    var articles=DATA[company];
    var tot=articles.length;
    var color=COMPANY_HEX[company];
    var catData=cats.map(function(cat){return{name:cat,count:articles.filter(function(a){return a.c===cat}).length,color:CAT_COLORS[cat]}});
    html+='<div style="display:flex;align-items:center;margin-bottom:14px;gap:14px">';
    html+='<div style="width:100px;text-align:right;font-weight:700;font-size:1.05rem;color:'+color+';flex-shrink:0">'+company+'</div>';
    html+='<div style="flex:1;display:flex;height:40px;border-radius:8px;overflow:hidden;background:#f3f4f6">';
    var nonZero=catData.filter(function(x){return x.count>0});
    nonZero.forEach(function(x,idx){
      var isLast=(idx===nonZero.length-1);
      var pct=isLast?100-nonZero.slice(0,idx).reduce(function(s,v){return s+Math.round(v.count/tot*100)},0):Math.round(x.count/tot*100);
      var label=short_[x.name]||x.name;
      html+='<div style="flex:'+x.count+';background:'+x.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700;min-width:30px" title="'+x.name+' '+x.count+'건 ('+pct+'%)">';
      html+=pct>=8?(label+' '+pct+'%'):(pct+'%');
      html+='</div>';
    });
    html+='</div>';
    html+='<div style="width:45px;font-weight:800;font-size:1rem;color:'+color+'">'+tot+'건</div>';
    html+='</div>';
  });
  html+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;padding-left:114px">';
  cats.forEach(function(cat){
    html+='<span style="font-size:.85rem;color:'+CAT_COLORS[cat]+';font-weight:600">● '+(short_[cat]||cat)+'</span>';
  });
  html+='</div>';
  area.innerHTML=html;
})();

// ─── 네비게이션 ───
let current=0;
const slides=document.querySelectorAll('.slide');
const total=slides.length;

function updateNav(){
  document.getElementById('progress').style.width=`${((current+1)/total)*100}%`;
  document.querySelectorAll('.nav-item').forEach((btn,i)=>{
    const isActive=i===current;
    btn.classList.toggle('active',isActive);
    btn.style.background=isActive?btn.dataset.color:'';
  });
}

function goTo(idx){
  if(idx<0||idx>=total||idx===current)return;
  current=idx;
  slides.forEach((s,i)=>{s.className='slide'+(i===current?' active':'')});
  slides[current].scrollTop=0;
  updateNav();
  if(current===1)setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.classList.add('animate')),100);
}

function navigate(dir){
  if(current+dir<0||current+dir>=total)return;
  current+=dir;
  slides.forEach((s,i)=>{s.className='slide'+(i===current?' active':'')});
  slides[current].scrollTop=0;
  updateNav();
  if(current===1)setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.classList.add('animate')),100);
}
updateNav();

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});

let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX});
document.addEventListener('touchend',e=>{const diff=e.changedTouches[0].clientX-touchStartX;if(Math.abs(diff)>50)navigate(diff<0?1:-1)});

// ─── 카테고리 필터 ───
document.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  const bar=btn.closest('.filter-bar');
  const company=bar.dataset.company;
  bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cat=btn.dataset.cat;
  const grid=document.querySelector(`.cards-grid[data-company="${company}"]`);
  grid.querySelectorAll('.news-card-link').forEach(card=>{
    card.style.display=(cat==='전체'||card.dataset.cat===cat)?'block':'none';
  });
});
</script>
